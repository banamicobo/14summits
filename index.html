<head>

<title>14 Summits — Pierwsze wejścia na ośmiotysięczniki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f0f4f8;
  --bg2: #e2eaf3;
  --map-bg: #0b1929;
  --map-land: #1a3050;
  --map-land2: #1e3a5f;
  --map-border: #2a4a72;
  --navy: #0f2240;
  --navy2: #1a3560;
  --orange: #d4541a;
  --orange-glow: #e8621a;
  --orange-light: rgba(212,84,26,0.15);
  --cold-blue: #4a7fb5;
  --cold-blue-light: #7aacd4;
  --snow: #f8fafc;
  --text: #0f2240;
  --text2: #4a5e7a;
  --text3: #8094b0;
  --open: #d4201a;
  --open-bg: rgba(212,32,26,0.12);
  --achieved-summer: #1a7fd4;
  --achieved-winter: #4a5ecc;
  --achieved-alpine: #2ab05a;
  --panel-w: 380px;
  --panel-w-mobile: 100%;
}
html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }
a { color: inherit; text-decoration: none; }

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100%; }

/* HEADER */
#header {
  background: var(--navy);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  z-index: 50;
}
#header-left { display: flex; align-items: center; gap: 16px; }
#logo { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
#logo span { color: var(--orange-glow); }
#tagline { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.08em; text-transform: uppercase; display: none; }
@media (min-width: 600px) { #tagline { display: block; } }

#lang-switcher { display: flex; gap: 4px; }
.lang-btn {
  background: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.5);
  font-family: inherit; font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
  padding: 4px 10px; border-radius: 4px; cursor: pointer; transition: all 0.15s;
}
.lang-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }
.lang-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }

/* FILTERS */
#filter-bar {
  background: var(--navy2);
  padding: 0 24px;
  height: 44px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  overflow-x: auto;
  scrollbar-width: none;
}
#filter-bar::-webkit-scrollbar { display: none; }
.filter-label { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; margin-right: 4px; white-space: nowrap; }
.filter-btn {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.55); font-family: inherit; font-size: 11px; font-weight: 500;
  padding: 5px 14px; border-radius: 20px; cursor: pointer; transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 6px;
}
.filter-btn .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.filter-btn:hover { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.9); }
.filter-btn.active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); color: #fff; }

/* MAIN */
#main { display: flex; flex: 1; overflow: hidden; }

/* MAP */
#map-container {
  flex: 1;
  background: var(--map-bg);
  position: relative;
  overflow: hidden;
}
#map-container svg { width: 100%; height: 100%; }
.country { fill: var(--map-land); stroke: var(--map-border); stroke-width: 0.5; }
.country-highlight { fill: var(--map-land2); }
.graticule { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 0.5; }
.sphere { fill: #081422; }

/* PEAK MARKERS */
.peak-marker { cursor: pointer; }
.peak-outer {
  transition: all 0.2s;
}
.peak-marker:hover .peak-outer { filter: brightness(1.4); }
.peak-pulse {
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; r: 14px; }
  50% { opacity: 0.1; r: 18px; }
}
.peak-label {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 10px;
  font-weight: 500;
  fill: rgba(255,255,255,0.8);
  pointer-events: none;
  text-anchor: middle;
}
.peak-label.active { fill: #fff; font-weight: 600; }

/* DETAIL PANEL */
#panel {
  width: var(--panel-w);
  background: var(--snow);
  border-left: 1px solid rgba(15,34,64,0.1);
  flex-shrink: 0;
  overflow-y: auto;
  transform: translateX(var(--panel-w));
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  position: relative;
}
#panel.open { transform: translateX(0); }
#panel-header {
  padding: 24px 24px 16px;
  background: var(--navy);
  color: #fff;
  flex-shrink: 0;
}
#panel-close {
  position: absolute; top: 14px; right: 14px;
  background: rgba(255,255,255,0.1); border: none; color: #fff;
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
#panel-close:hover { background: rgba(255,255,255,0.2); }
#panel-peak-name { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 2px; }
#panel-peak-name-native { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 12px; }
#panel-elevation {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--orange); color: #fff;
  padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 600;
}
#panel-location { margin-top: 8px; font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 0.06em; text-transform: uppercase; }
#panel-body { padding: 20px 24px; flex: 1; }

.category-block { margin-bottom: 20px; }
.category-block:last-child { margin-bottom: 0; }
.cat-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  padding-bottom: 8px; border-bottom: 1px solid rgba(15,34,64,0.08);
}
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); }
.cat-badge {
  margin-left: auto; font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  padding: 2px 8px; border-radius: 3px; text-transform: uppercase;
}
.badge-done { background: rgba(26,127,212,0.12); color: var(--achieved-summer); }
.badge-winter { background: rgba(74,94,204,0.12); color: var(--achieved-winter); }
.badge-alpine { background: rgba(42,176,90,0.12); color: var(--achieved-alpine); }
.badge-open { background: var(--open-bg); color: var(--open); }

.detail-row { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
.detail-row:last-child { margin-bottom: 0; }
.detail-key { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
.detail-val { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.4; }
.detail-note { font-size: 11px; color: var(--text2); font-style: italic; line-height: 1.5; margin-top: 6px; padding: 8px; background: rgba(15,34,64,0.04); border-radius: 4px; border-left: 3px solid var(--cold-blue); }
.open-block {
  background: var(--open-bg); border: 1px dashed rgba(212,32,26,0.3);
  border-radius: 6px; padding: 12px; text-align: center;
}
.open-block .open-label { font-size: 11px; font-weight: 700; color: var(--open); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.open-block .open-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

/* LEGEND */
#legend {
  position: absolute; bottom: 20px; left: 20px;
  background: rgba(11,25,41,0.92); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 12px 16px;
  z-index: 10;
}
.legend-title { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
.legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: rgba(255,255,255,0.65); margin-bottom: 5px; }
.legend-row:last-child { margin-bottom: 0; }
.legend-marker { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-open { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--open); flex-shrink: 0; }

/* TOOLTIP */
#map-tooltip {
  position: absolute; pointer-events: none;
  background: rgba(11,25,41,0.95); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #fff;
  opacity: 0; transition: opacity 0.12s; z-index: 20; white-space: nowrap;
}
#map-tooltip .tt-elev { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* EMPTY STATE */
#map-hint {
  position: absolute; bottom: 20px; right: 20px;
  font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 0.06em;
  pointer-events: none;
}

/* MOBILE PANEL */
@media (max-width: 720px) {
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 100%; max-width: 420px;
    transform: translateX(100%);
    z-index: 100; box-shadow: -8px 0 40px rgba(0,0,0,0.4);
  }
  #panel.open { transform: translateX(0); }
  #legend { bottom: 56px; }
}

/* SCROLL */
#panel::-webkit-scrollbar { width: 4px; }
#panel::-webkit-scrollbar-track { background: transparent; }
#panel::-webkit-scrollbar-thumb { background: rgba(15,34,64,0.2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div id="header-left">
      <div id="logo"><span>14</span> Summits</div>
      <div id="tagline" data-i18n="tagline"></div>
    </div>
    <div id="lang-switcher">
      <button class="lang-btn active" onclick="setLang('pl')">PL</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('np')">नेपाली</button>
    </div>
  </header>

  <!-- FILTERS -->
  <div id="filter-bar">
    <span class="filter-label" data-i18n="filter-label"></span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
      <span data-i18n="filter-all"></span>
    </button>
    <button class="filter-btn" data-filter="summer" onclick="setFilter('summer')">
      <span class="dot" style="background:var(--achieved-summer)"></span>
      <span data-i18n="filter-summer"></span>
    </button>
    <button class="filter-btn" data-filter="winter" onclick="setFilter('winter')">
      <span class="dot" style="background:var(--achieved-winter)"></span>
      <span data-i18n="filter-winter"></span>
    </button>
    <button class="filter-btn" data-filter="alpine" onclick="setFilter('alpine')">
      <span class="dot" style="background:var(--achieved-alpine)"></span>
      <span data-i18n="filter-alpine"></span>
    </button>
    <button class="filter-btn" data-filter="open" onclick="setFilter('open')">
      <span class="dot" style="background:var(--open)"></span>
      <span data-i18n="filter-open"></span>
    </button>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="map-container">
      <svg id="map"></svg>
      <div id="legend">
        <div class="legend-title" data-i18n="legend-title"></div>
        <div class="legend-row"><div class="legend-marker" style="background:var(--achieved-summer)"></div><span data-i18n="leg-summer"></span></div>
        <div class="legend-row"><div class="legend-marker" style="background:var(--achieved-winter)"></div><span data-i18n="leg-winter"></span></div>
        <div class="legend-row"><div class="legend-marker" style="background:var(--achieved-alpine)"></div><span data-i18n="leg-alpine"></span></div>
        <div class="legend-row"><div class="legend-open"></div><span data-i18n="leg-open"></span></div>
      </div>
      <div id="map-hint" data-i18n="map-hint"></div>
      <div id="map-tooltip"><div id="tt-name"></div><div class="tt-elev" id="tt-elev"></div></div>
    </div>

    <!-- DETAIL PANEL -->
    <div id="panel">
      <div id="panel-header">
        <button id="panel-close" onclick="closePanel()">✕</button>
        <div id="panel-peak-name"></div>
        <div id="panel-peak-name-native"></div>
        <div id="panel-elevation"></div>
        <div id="panel-location"></div>
      </div>
      <div id="panel-body"></div>
    </div>
  </div>
</div>

// ─── STATE ──────────────────────────────────────────────────────────────────
let activePeak = null;
let activeFilter = 'all';

// ─── FILTER ─────────────────────────────────────────────────────────────────
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  updateMarkers();
  if (activePeak) closePanel();
}

function peakMatchesFilter(p) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'summer') return !!p.summer;
  if (activeFilter === 'winter') return !!p.winter;
  if (activeFilter === 'alpine') return !!p.alpine;
  if (activeFilter === 'open') return !p.alpineWinter;
  return true;
}

function getPeakColor(p) {
  if (activeFilter === 'winter' && p.winter) return 'var(--achieved-winter)';
  if (activeFilter === 'alpine' && p.alpine) return 'var(--achieved-alpine)';
  if (activeFilter === 'open') return 'var(--open)';
  if (activeFilter === 'summer' && p.summer) return 'var(--achieved-summer)';
  // default: show main category
  if (p.alpine?.year === p.summer?.year) return 'var(--achieved-alpine)';
  return 'var(--achieved-summer)';
}

// ─── MAP ────────────────────────────────────────────────────────────────────
const svg = d3.select('#map');
const mapContainer = document.getElementById('map-container');
let W = mapContainer.clientWidth, H = mapContainer.clientHeight;

const projection = d3.geoMercator()
  .center([82, 30])
  .scale(Math.min(W, H) * 2.2)
  .translate([W / 2, H / 2]);

const path = d3.geoPath().projection(projection);
const g = svg.append('g');

// Graticule
const grat = d3.geoGraticule()();
g.append('path').datum(grat).attr('class', 'graticule').attr('d', path);

// Load world topology
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    g.selectAll('.country')
      .data(countries.features)
      .join('path')
      .attr('class', d => {
        const highlightIds = ['356', '524', '586', '156', '050', '051', '050']; // India, Nepal, Pakistan, China, Bangladesh, Afghanistan
        return 'country' + (highlightIds.includes(d.id?.toString()) ? ' country-highlight' : '');
      })
      .attr('d', path);
    drawPeaks();
  })
  .catch(() => {
    // Fallback if fetch fails
    drawPeaks();
  });

const tooltip = document.getElementById('map-tooltip');

function drawPeaks() {
  const markerG = g.append('g').attr('class', 'peaks-layer');

  PEAKS.forEach(p => {
    const [px, py] = projection([p.lng, p.lat]);
    const pg = markerG.append('g')
      .attr('class', 'peak-marker')
      .attr('transform', `translate(${px},${py})`)
      .attr('data-id', p.id);

    // Pulse ring for open alpine winter
    pg.append('circle')
      .attr('class', 'peak-pulse')
      .attr('r', 14)
      .attr('fill', 'rgba(212,32,26,0.15)')
      .attr('stroke', 'none');

    // Outer ring
    pg.append('circle')
      .attr('class', 'peak-outer')
      .attr('r', 9)
      .attr('fill', 'rgba(212,84,26,0.08)')
      .attr('stroke', 'var(--open)')
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', p.isMain ? 'none' : '3 2');

    // Inner dot
    pg.append('circle')
      .attr('r', 5)
      .attr('fill', p.isMain ? 'var(--orange-glow)' : 'var(--achieved-summer)')
      .attr('stroke', '#fff')
      .attr('stroke-width', 1);

    // Label
    pg.append('text')
      .attr('class', 'peak-label')
      .attr('dy', -14)
      .text(p.rank + '. ' + p.names.pl);

    // Interactions
    pg.on('click', () => openPanel(p))
      .on('mousemove', (e) => {
        document.getElementById('tt-name').textContent = p.names[lang] + ' (' + p.elevation + ' m)';
        document.getElementById('tt-elev').textContent = p.location[lang];
        const rect = mapContainer.getBoundingClientRect();
        tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
        tooltip.style.top = (e.clientY - rect.top - 40) + 'px';
        tooltip.style.opacity = 1;
      })
      .on('mouseleave', () => { tooltip.style.opacity = 0; });
  });
  updateMarkers();
}

function updateMarkers() {
  d3.selectAll('.peak-marker').each(function(d, i) {
    const el = d3.select(this);
    const pid = this.getAttribute('data-id');
    const p = PEAKS.find(x => x.id === pid);
    if (!p) return;
    const visible = peakMatchesFilter(p);
    el.style('opacity', visible ? 1 : 0.2);
    el.select('.peak-pulse').style('display', activeFilter === 'open' ? 'block' : 'none');
    el.select('.peak-label').text(p.rank + '. ' + p.names[lang]);
  });
}

// Zoom
const zoom = d3.zoom().scaleExtent([0.5, 8]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom);

window.addEventListener('resize', () => {
  W = mapContainer.clientWidth; H = mapContainer.clientHeight;
  projection.translate([W / 2, H / 2]).scale(Math.min(W, H) * 2.2);
  g.selectAll('path').attr('d', path);
  // Redraw peaks
  g.select('.peaks-layer').remove();
  drawPeaks();
});

// ─── PANEL ──────────────────────────────────────────────────────────────────
function openPanel(p) {
  activePeak = p;
  document.getElementById('panel-peak-name').textContent = p.names[lang];
  document.getElementById('panel-peak-name-native').textContent = [p.names.np !== p.names[lang] ? p.names.np : '', p.altName || ''].filter(Boolean).join(' · ');
  document.getElementById('panel-elevation').textContent = p.elevation.toLocaleString() + ' ' + t('elevation');
  document.getElementById('panel-location').textContent = p.location[lang];

  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  const categories = [
    { key: 'summer', label: t('cat-summer'), color: 'var(--achieved-summer)', data: p.summer, badgeClass: 'badge-done' },
    { key: 'winter', label: t('cat-winter'), color: 'var(--achieved-winter)', data: p.winter, badgeClass: 'badge-winter' },
    { key: 'alpine', label: t('cat-alpine'), color: 'var(--achieved-alpine)', data: p.alpine, badgeClass: 'badge-alpine' },
    { key: 'alpineWinter', label: t('cat-alpine-winter'), color: 'var(--open)', data: p.alpineWinter, badgeClass: 'badge-open', alwaysShow: true }
  ];

  categories.forEach(cat => {
    if (!cat.data && !cat.alwaysShow) return;
    const block = document.createElement('div');
    block.className = 'category-block';

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `<div class="cat-dot" style="background:${cat.color}"></div><div class="cat-title">${cat.label}</div>`;

    if (cat.data) {
      const badge = document.createElement('span');
      badge.className = 'cat-badge ' + cat.badgeClass;
      badge.textContent = cat.key === 'winter' ? t('done') : t('done');
      if (cat.key === 'alpine') badge.textContent = cat.data.year;
      header.appendChild(badge);
    } else {
      const badge = document.createElement('span');
      badge.className = 'cat-badge badge-open';
      badge.textContent = t('open');
      header.appendChild(badge);
    }
    block.appendChild(header);

    if (cat.data) {
      if (cat.data.year) addRow(block, t('year'), cat.data.year);
      if (cat.data.climbers) addRow(block, t('climbers'), cat.data.climbers);
      if (cat.data.country) addRow(block, t('country'), cat.data.country);
      if (cat.data.style) addRow(block, t('style'), t(cat.data.style));
      if (cat.data.oxygen) addRow(block, t('oxygen'), t(cat.data.oxygen));
      if (cat.data.note) {
        const note = document.createElement('div');
        note.className = 'detail-note';
        note.textContent = typeof cat.data.note === 'string' ? cat.data.note : (cat.data.note[lang] || cat.data.note.pl);
        block.appendChild(note);
      }
    } else if (cat.alwaysShow) {
      const ob = document.createElement('div');
      ob.className = 'open-block';
      ob.innerHTML = `<div class="open-label">⬤ ${t('open')}</div><div class="open-desc">${
        lang === 'pl' ? 'Nikt nie wszedł na ten szczyt w stylu alpejskim zimą. Ta kategoria pozostaje otwarta na wszystkich 14 ośmiotysięcznikach.' :
        lang === 'en' ? 'No one has summited this peak in alpine style during winter. This category remains open on all 14 eight-thousanders.' :
        'कुनै पनि व्यक्तिले यो शिखरमा हिउँदमा अल्पाइन शैलीमा आरोहण गरेका छैनन्।'
      }</div>`;
      block.appendChild(ob);
    }
    body.appendChild(block);
  });

  document.getElementById('panel').classList.add('open');
}

function addRow(parent, key, val) {
  const row = document.createElement('div');
  row.className = 'detail-row';
  row.innerHTML = `<div class="detail-key">${key}</div><div class="detail-val">${val}</div>`;
  parent.appendChild(row);
}

function closePanel() {
  activePeak = null;
  document.getElementById('panel').classList.remove('open');
}

// ─── INIT ───────────────────────────────────────────────────────────────────
applyI18n();
