<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>14 SUMMITS // TACTICAL DATABASE</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#03080d;--bg2:#050d14;
  --ph:#4db8ff;--ph-dim:rgba(77,184,255,.22);--ph-faint:rgba(77,184,255,.06);
  --amber:#e8a020;--red:#ff2b2b;--red-dim:rgba(255,43,43,.13);
  --blue-w:#7ee3ff;--alp:#7be850;
  --brd:rgba(77,184,255,.18);--brd2:rgba(77,184,255,.09);
  --txt:rgba(77,184,255,.88);--txt2:rgba(77,184,255,.42);--txt3:rgba(77,184,255,.2);
}
html,body{height:100%;background:#010407;color:var(--txt);font-family:'Space Mono',monospace;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.045) 2px,rgba(0,0,0,.045) 4px);}

/* ══ LANDING ════════════════════════════════════════════════════════════════ */
#landing{
  position:fixed;inset:0;z-index:500;
  background:#010407;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  transition:opacity 1s ease;
}
#landing.out{opacity:0;pointer-events:none;}
#landing-stars{position:absolute;inset:0;overflow:hidden;}
#lc{position:relative;z-index:2;text-align:center;max-width:700px;padding:0 32px;}
.l-tag{font-size:9px;letter-spacing:.25em;color:var(--txt3);margin-bottom:24px;}
.l-title{font-size:clamp(36px,6vw,72px);font-weight:700;color:#fff;letter-spacing:-.02em;
  line-height:1.05;margin-bottom:16px;}
.l-title em{color:var(--red);font-style:normal;}
.l-punch{font-size:clamp(12px,1.6vw,16px);color:var(--txt2);letter-spacing:.04em;
  line-height:1.8;margin-bottom:40px;}
.l-punch strong{color:rgba(77,184,255,.75);}
#btn-start{
  background:none;border:1px solid var(--ph);color:var(--ph);
  font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
  letter-spacing:.2em;padding:14px 40px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
#btn-start::before{content:'';position:absolute;inset:0;background:var(--ph);
  transform:translateX(-100%);transition:transform .3s ease;z-index:-1;}
#btn-start:hover{color:#000;}
#btn-start:hover::before{transform:translateX(0);}
.l-hint{margin-top:18px;font-size:9px;color:var(--txt3);letter-spacing:.12em;animation:blink 2s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ══ GLOBE LAYER ════════════════════════════════════════════════════════════ */
#globe-layer{
  position:fixed;inset:0;z-index:400;
  background:#010407;
  opacity:0;pointer-events:none;
  transition:opacity .6s ease;
}
#globe-layer.show{opacity:1;}
#globe-layer.out{opacity:0;}
#globe-svg{width:100%;height:100%;}

/* ══ APP ════════════════════════════════════════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity 1.2s ease;}
#app.show{opacity:1;}

/* HEADER */
#header{height:50px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--brd);
  display:flex;align-items:center;padding:0 18px;gap:18px;z-index:50;}
#sys{display:flex;align-items:center;gap:7px;font-size:9px;color:var(--ph);letter-spacing:.14em;}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--ph);animation:blink 1.3s step-end infinite;}
#logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:.06em;}
#logo em{color:var(--ph);font-style:normal;}
#logo small{color:var(--txt2);font-size:9px;font-weight:400;letter-spacing:.14em;margin-left:10px;}
#clock{margin-left:auto;font-size:9px;color:var(--txt2);letter-spacing:.08em;}
#lang-sw{display:flex;gap:3px;}
.lbtn{background:none;border:1px solid var(--brd2);color:var(--txt2);font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:.1em;padding:3px 9px;cursor:pointer;transition:all .12s;}
.lbtn:hover{border-color:var(--ph);color:var(--ph);}
.lbtn.active{background:var(--ph);border-color:var(--ph);color:#000;font-weight:700;}

/* FILTER */
#fbar{height:36px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--brd2);
  display:flex;align-items:center;padding:0 18px;gap:5px;overflow-x:auto;scrollbar-width:none;}
#fbar::-webkit-scrollbar{display:none;}
.fp{font-size:9px;color:var(--txt3);letter-spacing:.12em;margin-right:3px;white-space:nowrap;}
.fbtn{background:none;border:1px solid var(--brd2);color:var(--txt2);font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:.08em;padding:3px 11px;cursor:pointer;transition:all .12s;white-space:nowrap;
  display:flex;align-items:center;gap:5px;}
.fbtn .fd{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.fbtn:hover{border-color:var(--ph-dim);color:var(--txt);}
.fbtn.active{border-color:var(--ph);color:var(--ph);background:var(--ph-faint);}

/* MAP SECTION */
#map-sec{flex:1;position:relative;overflow:hidden;}
#map-svg{position:absolute;inset:0;width:100%;height:100%;}
#map-sec::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background-image:linear-gradient(rgba(77,184,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(77,184,255,.03) 1px,transparent 1px);
  background-size:55px 55px;}
.sphere{fill:#020609;}
.graticule{fill:none;stroke:rgba(77,184,255,.04);stroke-width:.5;}
.country{fill:#071118;stroke:rgba(77,184,255,.38);stroke-width:.85;}
.country-hi{fill:#0c1e2e;stroke:rgba(77,184,255,.55);stroke-width:1;}

/* RETICLE */
.peak-g{cursor:pointer;}
.ret-ring{fill:none;stroke-dasharray:4 3;}
.ret-arm{stroke-width:.9;}
.ret-pulse{fill:none;animation:rp 2.2s ease-out infinite;}
@keyframes rp{0%{r:10px;opacity:.45;stroke-width:1.5}100%{r:26px;opacity:0;stroke-width:.3}}

/* LEADER LINES */
#leader-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3;
  opacity:0;transition:opacity 1s ease;}
#leader-svg.show{opacity:1;}

/* FLOATING CARDS */
.pcard{
  position:absolute;width:144px;
  background:rgba(3,8,13,.86);border:1px solid rgba(77,184,255,.18);
  padding:7px 9px;cursor:pointer;
  transition:border-color .15s,background .15s,opacity .4s ease;
  z-index:4;backdrop-filter:blur(3px);
  opacity:0;
}
.pcard.show{opacity:1;}
.pcard:hover{border-color:rgba(77,184,255,.5);background:rgba(3,8,13,.95);}
.pcard.selected{border-color:var(--ph);box-shadow:0 0 12px rgba(77,184,255,.15);}
.pcard.is-main{border-color:rgba(255,43,43,.4);}
.pcard.is-main:hover{border-color:rgba(255,43,43,.75);}
.pcard.is-main.selected{border-color:var(--red);box-shadow:0 0 12px rgba(255,43,43,.2);}
.pc-top{display:flex;align-items:baseline;gap:5px;margin-bottom:2px;}
.pc-rank{font-size:8px;color:var(--txt3);}
.pc-name{font-size:10px;font-weight:700;color:#fff;letter-spacing:.04em;line-height:1.2;}
.pc-name.main{color:var(--red);}
.pc-elev{font-size:8px;color:var(--txt2);letter-spacing:.06em;margin-bottom:4px;}
.pc-dots{display:flex;gap:3px;align-items:center;}
.ds,.dw,.da{width:5px;height:5px;border-radius:50%;}
.ds.on{background:#4db8ff;}.ds.off{background:rgba(77,184,255,.12);}
.dw.on{background:#7ee3ff;}.dw.off{background:rgba(126,227,255,.12);}
.da.on{background:#7be850;}.da.off{background:rgba(123,232,80,.12);}
.daw{width:5px;height:5px;border-radius:50%;border:1px solid rgba(255,43,43,.65);animation:blink 1.6s step-end infinite;}
.dlbl{font-size:7px;color:var(--txt3);letter-spacing:.04em;margin-left:1px;}

/* PANEL */
#panel{position:absolute;top:0;right:0;bottom:0;width:360px;z-index:30;
  background:var(--bg2);border-left:1px solid var(--brd);
  transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow-y:auto;}
#panel.open{transform:translateX(0);}
#panel::-webkit-scrollbar{width:3px;}
#panel::-webkit-scrollbar-thumb{background:var(--brd);}
#ptop{padding:18px 18px 14px;border-bottom:1px solid var(--brd2);flex-shrink:0;position:relative;}
#pclose{position:absolute;top:12px;right:12px;background:none;border:1px solid var(--brd2);
  color:var(--txt2);font-family:'Space Mono',monospace;font-size:11px;width:24px;height:24px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
#pclose:hover{border-color:var(--red);color:var(--red);}
.psl{font-size:8px;color:var(--ph);letter-spacing:.15em;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;}
.psl::before{content:'';display:block;width:5px;height:5px;background:var(--ph);animation:blink 1s step-end infinite;}
#pname{font-size:19px;font-weight:700;color:#fff;letter-spacing:.03em;margin-bottom:2px;}
#palt{font-size:10px;color:var(--txt2);letter-spacing:.05em;margin-bottom:10px;}
.pmeta{display:flex;gap:7px;flex-wrap:wrap;}
.mchip{font-size:8px;letter-spacing:.1em;padding:2px 7px;border:1px solid var(--brd2);color:var(--txt2);}
.mchip.elv{border-color:var(--amber);color:var(--amber);}
#pbody{padding:14px 18px;flex:1;}
.csec{margin-bottom:18px;}
.chead{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--brd2);}
.cdot{width:7px;height:7px;flex-shrink:0;}
.clbl{font-size:8px;letter-spacing:.14em;color:var(--txt2);flex:1;}
.cbadge{font-size:8px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border:1px solid;}
.bok{border-color:var(--ph);color:var(--ph);}
.bw{border-color:var(--blue-w);color:var(--blue-w);}
.ba{border-color:var(--alp);color:var(--alp);}
.bop{border-color:var(--red);color:var(--red);animation:blink 1.5s step-end infinite;}
.drow{display:flex;margin-bottom:5px;gap:8px;}
.dky{font-size:8px;color:var(--txt3);letter-spacing:.1em;width:72px;flex-shrink:0;padding-top:1px;}
.dval{font-size:10px;color:var(--txt);letter-spacing:.04em;line-height:1.5;}
.nbox{margin-top:7px;padding:7px 9px;border-left:2px solid var(--ph-dim);
  background:var(--ph-faint);font-size:9px;color:var(--txt2);letter-spacing:.04em;line-height:1.6;}
.otgt{background:var(--red-dim);border:1px dashed rgba(255,43,43,.3);padding:10px;text-align:center;margin-top:4px;}
.otl{font-size:9px;color:var(--red);letter-spacing:.15em;margin-bottom:4px;font-weight:700;}
.otd{font-size:9px;color:rgba(255,100,100,.6);letter-spacing:.03em;line-height:1.6;}

/* LEGEND */
#legend{position:absolute;bottom:30px;left:12px;z-index:8;
  background:rgba(3,8,13,.92);border:1px solid var(--brd2);padding:9px 12px;}
.lt{font-size:8px;color:var(--txt3);letter-spacing:.14em;margin-bottom:7px;}
.lr{display:flex;align-items:center;gap:7px;font-size:8px;color:var(--txt2);letter-spacing:.06em;margin-bottom:4px;}
.lr:last-child{margin-bottom:0;}
.lc{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.lo{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--red);flex-shrink:0;}

/* COORDS */
#cbar{position:absolute;bottom:0;left:0;right:0;height:26px;z-index:8;
  background:rgba(3,8,13,.9);border-top:1px solid var(--brd2);
  display:flex;align-items:center;padding:0 14px;gap:28px;}
.ci{font-size:9px;color:var(--txt3);letter-spacing:.08em;}
.ci span{color:var(--txt2);}

/* TOOLTIP */
#tip{position:absolute;pointer-events:none;z-index:25;
  background:rgba(3,8,13,.97);border:1px solid var(--brd);
  padding:7px 11px;font-size:9px;color:var(--ph);letter-spacing:.06em;
  opacity:0;transition:opacity .1s;white-space:nowrap;}
#tip .ts{font-size:8px;color:var(--txt2);margin-top:2px;}
</style>
</head>
<body>

<!-- ══ LANDING ══════════════════════════════════════════════════════════════ -->
<div id="landing">
  <div id="landing-stars"></div>
  <div id="lc">
    <div class="l-tag">BAZA DANYCH // 14 OŚMIOTYSIĘCZNIKÓW // DOSTĘP ZASTRZEŻONY</div>
    <h1 class="l-title">K2 ZIMĄ<br><em>ZDOBYTE?</em></h1>
    <p class="l-punch">
      W 2021 roku świat świętował zdobycie K2 zimą.<br>
      <strong>Nikt nie powiedział wam całej prawdy.</strong><br>
      Styl alpejski zimą — na żadnym z 14 ośmiotysięczników — nie istnieje.
    </p>
    <button id="btn-start" onclick="startSequence()">▶ &nbsp;INICJUJ DOSTĘP DO BAZY</button>
    <div class="l-hint">[ NACIŚNIJ ABY KONTYNUOWAĆ ]</div>
  </div>
</div>

<!-- ══ GLOBE ═════════════════════════════════════════════════════════════════ -->
<div id="globe-layer">
  <svg id="globe-svg"></svg>
</div>

<!-- ══ APP ══════════════════════════════════════════════════════════════════ -->
<div id="app">
<header id="header">
  <div id="sys"><div class="bdot"></div><span data-i18n="sys"></span></div>
  <div id="logo"><em>14</em> SUMMITS <small>// <span data-i18n="tg"></span></small></div>
  <div id="clock"></div>
  <div id="lang-sw">
    <button class="lbtn active" onclick="setLang('pl')">PL</button>
    <button class="lbtn" onclick="setLang('en')">EN</button>
    <button class="lbtn" onclick="setLang('np')">NP</button>
  </div>
</header>
<div id="fbar">
  <span class="fp">&gt; <span data-i18n="fl"></span></span>
  <button class="fbtn active" data-filter="all"    onclick="setFilter('all')"   ><span data-i18n="fa"></span></button>
  <button class="fbtn" data-filter="summer" onclick="setFilter('summer')"><span class="fd" style="background:#4db8ff"></span><span data-i18n="fs"></span></button>
  <button class="fbtn" data-filter="winter" onclick="setFilter('winter')"><span class="fd" style="background:#7ee3ff"></span><span data-i18n="fw"></span></button>
  <button class="fbtn" data-filter="alpine" onclick="setFilter('alpine')"><span class="fd" style="background:#7be850"></span><span data-i18n="fal"></span></button>
  <button class="fbtn" data-filter="open"   onclick="setFilter('open')"  ><span class="fd" style="background:#ff2b2b"></span><span data-i18n="fo"></span></button>
</div>
<div id="map-sec">
  <svg id="map-svg"></svg>
  <svg id="leader-svg"></svg>
  <div id="legend">
    <div class="lt" data-i18n="leg"></div>
    <div class="lr"><div class="lc" style="background:#4db8ff"></div><span data-i18n="ls"></span></div>
    <div class="lr"><div class="lc" style="background:#7ee3ff"></div><span data-i18n="lw"></span></div>
    <div class="lr"><div class="lc" style="background:#7be850"></div><span data-i18n="la"></span></div>
    <div class="lr"><div class="lo"></div><span data-i18n="lo"></span></div>
  </div>
  <div id="cbar">
    <div class="ci">LAT <span id="c-lat">—</span></div>
    <div class="ci">LNG <span id="c-lng">—</span></div>
    <div class="ci" data-i18n="ct"></div>
    <div class="ci" id="c-pk" style="color:var(--ph)"></div>
  </div>
  <div id="tip"><div id="tn"></div><div class="ts" id="ts2"></div></div>
  <div id="panel">
    <div id="ptop">
      <button id="pclose" onclick="closePanel()">✕</button>
      <div class="psl" data-i18n="acq"></div>
      <div id="pname"></div>
      <div id="palt"></div>
      <div class="pmeta">
        <div class="mchip elv" id="p-el"></div>
        <div class="mchip" id="p-lo"></div>
        <div class="mchip" id="p-co"></div>
      </div>
    </div>
    <div id="pbody"></div>
  </div>
</div>
</div><!-- #app -->

<script>
// ══ I18N ═════════════════════════════════════════════════════════════════════
const T={
  pl:{sys:'SYSTEM AKTYWNY',tg:'BAZA DANYCH',fl:'FILTR',fa:'WSZYSTKIE',fs:'LETNIE',fw:'ZIMOWE',fal:'ALPEJSKIE',fo:'OTWARTE',
    leg:'LEGENDA',ls:'PIERWSZE LETNIE',lw:'PIERWSZE ZIMOWE',la:'STYL ALPEJSKI',lo:'NIEUKOŃCZONE',ct:'14 CELÓW',acq:'OBIEKT NAMIERZONY',
    yr:'ROK',cl:'OPERATORZY',co:'KRAJ',st:'STYL',ox:'TLEN',done:'POTWIERDZONE',open:'OTWARTE',
    exp:'OBLĘŻNICZY',alp:'ALPEJSKI',yes:'TAK',no:'NIE',mixed:'MIESZANY',els:'M N.P.M.',
    cats:'PIERWSZE WEJŚCIE LETNIE',catw:'PIERWSZE WEJŚCIE ZIMOWE',cata:'STYL ALPEJSKI (LETNI)',cataw:'STYL ALPEJSKI ZIMOWY',
    odesc:'Żaden operator nie wykonał wejścia w stylu alpejskim zimą. Cel pozostaje otwarty na wszystkich 14 ośmiotysięcznikach.'},
  en:{sys:'SYSTEM ACTIVE',tg:'TACTICAL DATABASE',fl:'FILTER',fa:'ALL',fs:'SUMMER',fw:'WINTER',fal:'ALPINE',fo:'OPEN',
    leg:'LEGEND',ls:'FIRST SUMMER',lw:'FIRST WINTER',la:'ALPINE STYLE',lo:'UNACHIEVED',ct:'14 TARGETS',acq:'OBJECT ACQUIRED',
    yr:'YEAR',cl:'OPERATORS',co:'COUNTRY',st:'STYLE',ox:'OXYGEN',done:'CONFIRMED',open:'OPEN',
    exp:'EXPEDITION',alp:'ALPINE',yes:'YES',no:'NO',mixed:'MIXED',els:'M A.S.L.',
    cats:'FIRST SUMMER ASCENT',catw:'FIRST WINTER ASCENT',cata:'ALPINE STYLE (SUMMER)',cataw:'ALPINE STYLE WINTER',
    odesc:'No operator has achieved an alpine style winter ascent. Target remains open on all 14 eight-thousanders.'},
  np:{sys:'सिस्टम सक्रिय',tg:'डेटाबेस',fl:'फिल्टर',fa:'सबै',fs:'ग्रीष्म',fw:'हिउँद',fal:'अल्पाइन',fo:'अपूर्ण',
    leg:'लेजेन्ड',ls:'पहिलो ग्रीष्म',lw:'पहिलो हिउँद',la:'अल्पाइन शैली',lo:'अपूर्ण',ct:'१४ लक्ष्य',acq:'लक्ष्य प्राप्त',
    yr:'वर्ष',cl:'आरोही',co:'देश',st:'शैली',ox:'अक्सिजन',done:'सम्पन्न',open:'अपूर्ण',
    exp:'अभियान',alp:'अल्पाइन',yes:'हो',no:'होइन',mixed:'मिश्रित',els:'मि.',
    cats:'पहिलो ग्रीष्म आरोहण',catw:'पहिलो हिउँद आरोहण',cata:'अल्पाइन शैली (ग्रीष्म)',cataw:'अल्पाइन शैली हिउँद',
    odesc:'कुनै पनि आरोहीले हिउँदमा अल्पाइन शैलीमा आरोहण गरेका छैनन्।'}
};
let lang='pl';
function t(k){return T[lang][k]||T.en[k]||k;}
function setLang(l){lang=l;document.querySelectorAll('.lbtn').forEach(b=>b.classList.toggle('active',b.textContent.trim().toLowerCase()===l||(l==='np'&&b.textContent==='NP')));applyI18n();if(activePeak)renderPanel(activePeak);}
function applyI18n(){document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));rebuildCards();}

// ══ CLOCK ════════════════════════════════════════════════════════════════════
function tick(){const n=new Date(),p=x=>String(x).padStart(2,'0');const el=document.getElementById('clock');if(el)el.textContent=`${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}  ${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}  UTC+1`;}
tick();setInterval(tick,1000);

// ══ DATA ════════════════════════════════════════════════════════════════════
// Pixel offsets from marker center (dx, dy)
const OFFSETS={
  // Karakoram — fanned radially
  'nanga-parbat':  {dx:-160,dy:-20},   // LEFT (isolated)
  'k2':            {dx:-160,dy:-95},   // UP-LEFT
  'broad-peak':    {dx:-160,dy: 55},   // DOWN-LEFT
  'gasherbrum-i':  {dx:  20,dy:-90},  // UP-RIGHT
  'gasherbrum-ii': {dx:  20,dy: 25},  // DOWN-RIGHT
  // Nepal western
  'dhaulagiri':    {dx:-160,dy:-90},  // UP-LEFT
  'annapurna':     {dx:  20,dy: 160}, // FAR DOWN-RIGHT (free south area)

let activePeak=null,activeFilter='all',curT=d3.zoomIdentity;

function setFilter(f){activeFilter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));updateVisibility();if(activePeak)closePanel();}
function peakVis(p){if(activeFilter==='all')return true;if(activeFilter==='summer')return!!p.summer;if(activeFilter==='winter')return!!p.winter;if(activeFilter==='alpine')return!!p.alpine;if(activeFilter==='open')return!p.alpineWinter;return true;}

// ══ MAP INIT ════════════════════════════════════════════════════════════════
const mapSvg=d3.select('#map-svg');
const mapSec=document.getElementById('map-sec');
let W=mapSec.clientWidth,H=mapSec.clientHeight;
const proj=d3.geoMercator().center([82,30]).scale(Math.min(W,H)*2.3).translate([W/2,H/2]);
const gp=d3.geoPath().projection(proj);
const root=mapSvg.append('g');

root.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',gp);
root.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',gp);

const hiIds=new Set(['356','524','586','156','050','004','762','417']);
let worldData=null;

function initMap(world){
  worldData=world;
  root.selectAll('.country')
    .data(topojson.feature(world,world.objects.countries).features)
    .join('path').attr('class',d=>'country'+(hiIds.has(String(d.id))?' country-hi':'')).attr('d',gp);
  buildGeoMarkers();
  rebuildCards();
}

// ══ GEO MARKERS ═════════════════════════════════════════════════════════════
function buildGeoMarkers(){
  const cg=root.append('g');
  CITIES.forEach(c=>{
    const[cx,cy]=proj([c.lng,c.lat]);
    const g=cg.append('g').attr('transform',`translate(${cx},${cy})`).attr('pointer-events','none');
    g.append('polygon').attr('points','0,-5 4,2 0,5 -4,2').attr('fill','rgba(77,184,255,.45)').attr('stroke','rgba(77,184,255,.7)').attr('stroke-width',.8);
    g.append('text').attr('dy',-8).attr('text-anchor','middle').attr('font-family',"'Space Mono',monospace").attr('font-size',8).attr('fill','rgba(77,184,255,.55)').attr('letter-spacing','.08em').text(c.name);
  });
  const mg=root.append('g').attr('class','mks');
  PEAKS.forEach(p=>{
    const[px,py]=proj([p.lng,p.lat]);
    const g=mg.append('g').attr('class','peak-g').attr('transform',`translate(${px},${py})`).attr('data-id',p.id);
    const col=p.isMain?'#ff2b2b':'rgba(77,184,255,.6)';
    g.append('circle').attr('class','ret-pulse').attr('r',10).attr('stroke',col).attr('fill','none');
    g.append('circle').attr('class','ret-ring').attr('r',9).attr('stroke',col).attr('fill','none');
    [[-14,-6],[6,14]].forEach(([a,b])=>g.append('line').attr('x1',a).attr('x2',b).attr('y1',0).attr('y2',0).attr('class','ret-arm').attr('stroke',col));
    [[-14,-6],[6,14]].forEach(([a,b])=>g.append('line').attr('x1',0).attr('x2',0).attr('y1',a).attr('y2',b).attr('class','ret-arm').attr('stroke',col));
    g.append('circle').attr('r',3).attr('fill',p.isMain?'#ff2b2b':'#4db8ff');
    const tipEl=document.getElementById('tip');
    g.on('click',()=>openPanel(p))
     .on('mousemove',e=>{
       document.getElementById('tn').textContent=p.names[lang]+' — '+p.elev.toLocaleString()+' M';
       document.getElementById('ts2').textContent=cs(p.lat,'NS')+' '+cs(p.lng,'EW');
       const r=mapSec.getBoundingClientRect();
       tipEl.style.left=(e.clientX-r.left+14)+'px';tipEl.style.top=(e.clientY-r.top-52)+'px';tipEl.style.opacity=1;
       document.getElementById('c-lat').textContent=cs(p.lat,'NS');
       document.getElementById('c-lng').textContent=cs(p.lng,'EW');
       document.getElementById('c-pk').textContent=p.names[lang];
     }).on('mouseleave',()=>{
       tipEl.style.opacity=0;
       document.getElementById('c-lat').textContent='—';document.getElementById('c-lng').textContent='—';document.getElementById('c-pk').textContent='';
     });
  });
}

function updateVisibility(){
  root.selectAll('.peak-g').each(function(){
    const p=PEAKS.find(x=>x.id===this.getAttribute('data-id'));if(!p)return;
    const v=peakVis(p);
    d3.select(this).style('opacity',v?1:.12);
    const pulse=activeFilter==='open';
    d3.select(this).select('.ret-pulse').attr('class',pulse?'ret-pulse':'').attr('stroke',pulse?(p.isMain?'#ff2b2b':'rgba(77,184,255,.5)'):'transparent');
  });
  document.querySelectorAll('.pcard').forEach(c=>{const p=PEAKS.find(x=>x.id===c.dataset.id);c.style.opacity=(p&&peakVis(p)&&c.classList.contains('show'))?1:.15;});
  updateCardPositions(curT);drawLeaders(curT);
}

// ══ FLOATING CARDS ══════════════════════════════════════════════════════════
function rebuildCards(){
  document.querySelectorAll('.pcard').forEach(c=>c.remove());
  PEAKS.forEach(p=>{
    const div=document.createElement('div');
    div.className='pcard'+(p.isMain?' is-main':'')+(activePeak?.id===p.id?' selected':'');
    div.dataset.id=p.id;
    div.style.left='-999px';div.style.top='-999px';
    div.innerHTML=`
      <div class="pc-top"><span class="pc-rank">#${p.rank}</span><span class="pc-name${p.isMain?' main':''}">${p.names[lang]}</span></div>
      <div class="pc-elev">${p.elev.toLocaleString()} M${p.alt?' · '+p.alt:''}</div>
      <div class="pc-dots">
        <div class="ds ${p.summer?'on':'off'}"></div><div class="dw ${p.winter?'on':'off'}"></div>
        <div class="da ${p.alpine?'on':'off'}"></div><div class="daw"></div>
        <span class="dlbl">S·W·A·AW</span>
      </div>`;
    div.onclick=()=>openPanel(p);
    mapSec.appendChild(div);
  });
  requestAnimationFrame(()=>{updateCardPositions(curT);drawLeaders(curT);});
}

function updateCardPositions(transform){
  PEAKS.forEach(p=>{
    const card=document.querySelector(`.pcard[data-id="${p.id}"]`);if(!card)return;
    const[gx,gy]=proj([p.lng,p.lat]);
    const[sx,sy]=transform.apply([gx,gy]);
    const off=OFFSETS[p.id]||{dx:18,dy:-50};
    const cw=card.offsetWidth||144,ch=card.offsetHeight||62;
    card.style.left=(off.dx<0?sx+off.dx-cw:sx+off.dx)+'px';
    card.style.top =(off.dy<0?sy+off.dy-ch:sy+off.dy)+'px';
  });
}

// ══ LEADER LINES ════════════════════════════════════════════════════════════
function drawLeaders(transform){
  const lsvg=document.getElementById('leader-svg');lsvg.innerHTML='';
  PEAKS.forEach(p=>{
    const card=document.querySelector(`.pcard[data-id="${p.id}"]`);if(!card)return;
    const mr=mapSec.getBoundingClientRect(),cr=card.getBoundingClientRect();
    const cx=cr.left-mr.left+cr.width/2,cy=cr.top-mr.top+cr.height/2;
    const[gx,gy]=proj([p.lng,p.lat]);const[mx,my]=transform.apply([gx,gy]);
    const dx=mx-cx,dy=my-cy,hw=cr.width/2+1,hh=cr.height/2+1;
    let ax,ay;
    if(Math.abs(dx)*hh>Math.abs(dy)*hw){ax=cx+(dx>0?hw:-hw);ay=cy+dy*(hw/Math.abs(dx));}
    else{ax=cx+dx*(hh/Math.abs(dy));ay=cy+(dy>0?hh:-hh);}
    const vis=peakVis(p),sc=p.isMain?'rgba(255,43,43,':'rgba(77,184,255,';
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',ax);line.setAttribute('y1',ay);line.setAttribute('x2',mx);line.setAttribute('y2',my);
    line.setAttribute('stroke',sc+(vis?.35:.07)+')');line.setAttribute('stroke-width','.8');
    lsvg.appendChild(line);
    const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',mx);dot.setAttribute('cy',my);dot.setAttribute('r','2');
    dot.setAttribute('fill',sc+(vis?.55:.1)+')');
    lsvg.appendChild(dot);
  });
}

// ══ PANEL ════════════════════════════════════════════════════════════════════
function openPanel(p){
  activePeak=p;
  document.querySelectorAll('.pcard').forEach(c=>c.classList.toggle('selected',c.dataset.id===p.id));
  document.getElementById('pname').textContent=p.names[lang];
  document.getElementById('palt').textContent=[p.alt,p.names.np!==p.names[lang]?p.names.np:''].filter(Boolean).join(' // ');
  document.getElementById('p-el').textContent=p.elev.toLocaleString()+' '+t('els');
  document.getElementById('p-lo').textContent=p.loc[lang];
  document.getElementById('p-co').textContent=cs(p.lat,'NS')+' '+cs(p.lng,'EW');
  renderPanel(p);
  document.getElementById('panel').classList.add('open');
}
function renderPanel(p){
  const body=document.getElementById('pbody');body.innerHTML='';
  [{key:'summer',lb:t('cats'),col:'#4db8ff',data:p.summer,bc:'bok'},
   {key:'winter',lb:t('catw'),col:'#7ee3ff',data:p.winter,bc:'bw'},
   {key:'alpine',lb:t('cata'),col:'#7be850',data:p.alpine,bc:'ba'},
   {key:'aw',lb:t('cataw'),col:'#ff2b2b',data:p.alpineWinter,bc:'bop',always:true}
  ].forEach(cat=>{
    if(!cat.data&&!cat.always)return;
    const sec=document.createElement('div');sec.className='csec';
    const head=document.createElement('div');head.className='chead';
    head.innerHTML=`<div class="cdot" style="background:${cat.col}"></div><div class="clbl">${cat.lb}</div>`;
    const badge=document.createElement('span');badge.className='cbadge '+(cat.data?cat.bc:'bop');
    badge.textContent=cat.data?t('done'):t('open');head.appendChild(badge);sec.appendChild(head);
    if(cat.data){
      if(cat.data.yr)addRow(sec,t('yr'),cat.data.yr);
      if(cat.data.cl)addRow(sec,t('cl'),cat.data.cl);
      if(cat.data.co)addRow(sec,t('co'),cat.data.co);
      if(cat.data.st)addRow(sec,t('st'),t(cat.data.st==='expedition'?'exp':'alp'));
      if(cat.data.ox)addRow(sec,t('ox'),t(cat.data.ox));
      if(cat.data.note){const nb=document.createElement('div');nb.className='nbox';nb.textContent=typeof cat.data.note==='string'?cat.data.note:(cat.data.note[lang]||cat.data.note.pl);sec.appendChild(nb);}
    }else if(cat.always){
      const ob=document.createElement('div');ob.className='otgt';
      ob.innerHTML=`<div class="otl">⬤ TARGET OPEN</div><div class="otd">${t('odesc')}</div>`;sec.appendChild(ob);
    }
    body.appendChild(sec);
  });
}
function addRow(p,k,v){const r=document.createElement('div');r.className='drow';r.innerHTML=`<div class="dky">${k}</div><div class="dval">${v}</div>`;p.appendChild(r);}
function closePanel(){activePeak=null;document.getElementById('panel').classList.remove('open');document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('selected'));}

// ══ HELPERS ══════════════════════════════════════════════════════════════════
function cs(v,dirs){const d=dirs[v>=0?0:1],a=Math.abs(v);return`${Math.floor(a)}°${String(Math.floor((a-Math.floor(a))*60)).padStart(2,'0')}'${d}`;}

// ══ GLOBE SEQUENCE ═══════════════════════════════════════════════════════════
async function startSequence(){
  document.getElementById('btn-start').disabled=true;

  // Load world data (reuse if already loaded)
  if(!worldData){
    worldData=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json());
  }

  // Fade out landing, show globe
  document.getElementById('landing').classList.add('out');
  setTimeout(()=>{
    document.getElementById('globe-layer').classList.add('show');
    runGlobe();
  },700);
}

function runGlobe(){
  const gsvg=d3.select('#globe-svg');
  const gw=window.innerWidth,gh=window.innerHeight;
  const initScale=Math.min(gw,gh)*0.36;

  const globeProj=d3.geoOrthographic()
    .scale(initScale).translate([gw/2,gh/2]).clipAngle(90).rotate([-30,-15]);

  const globePath=d3.geoPath().projection(globeProj);
  const countries=topojson.feature(worldData,worldData.objects.countries);

  // Defs: atmosphere glow + cloud sphere
  const defs=gsvg.append('defs');
  const atmo=defs.append('radialGradient').attr('id','atmo').attr('cx','50%').attr('cy','50%').attr('r','52%');
  atmo.append('stop').attr('offset','68%').attr('stop-color','transparent');
  atmo.append('stop').attr('offset','100%').attr('stop-color','rgba(77,184,255,.18)');

  // Ocean sphere
  const ocean=gsvg.append('circle')
    .attr('cx',gw/2).attr('cy',gh/2).attr('r',initScale)
    .attr('fill','#04111e').attr('stroke','rgba(77,184,255,.1)').attr('stroke-width','1.5');

  // Atmosphere
  const atmoEl=gsvg.append('circle')
    .attr('cx',gw/2).attr('cy',gh/2).attr('r',initScale+18)
    .attr('fill','url(#atmo)').attr('pointer-events','none');

  // Graticule
  const gratPath=gsvg.append('path').datum(d3.geoGraticule()())
    .attr('fill','none').attr('stroke','rgba(77,184,255,.07)').attr('stroke-width',.5);

  // Countries
  const lands=gsvg.append('g').selectAll('path')
    .data(countries.features).join('path')
    .attr('fill','#0d2035').attr('stroke','rgba(77,184,255,.28)').attr('stroke-width',.6);

  // Highlight target region (Himalayan countries)
  const hiSet=new Set(['356','524','586','156','050']);
  gsvg.append('g').selectAll('path')
    .data(countries.features.filter(d=>hiSet.has(String(d.id)))).join('path')
    .attr('fill','#143050').attr('stroke','rgba(77,184,255,.5)').attr('stroke-width',.8);

  function redraw(){
    const r=globeProj.scale();
    ocean.attr('r',r);atmoEl.attr('r',r+18);
    gratPath.attr('d',globePath);
    lands.attr('d',globePath);
    gsvg.selectAll('.hi-lands').attr('d',globePath);
  }

  // ── Animation ──────────────────────────────────────────────────────────
  // Phase 1: rotate to Nepal (2.2s)
  // Phase 2: zoom in fast (1.8s)
  // Phase 3: crossfade to flat map
  const rotFrom=[-30,-15], rotTo=[-82,-28];
  const scaleFrom=initScale, scaleTo=Math.min(gw,gh)*3.5;
  const t0=performance.now();
  const rotDur=2200, zoomStart=1800, zoomDur=1800, totalDur=3700;

  function frame(now){
    const el=now-t0;

    // Rotation
    const rt=Math.min(1,el/rotDur);
    const re=d3.easeCubicInOut(rt);
    globeProj.rotate([
      rotFrom[0]+(rotTo[0]-rotFrom[0])*re,
      rotFrom[1]+(rotTo[1]-rotFrom[1])*re,
    ]);

    // Zoom
    if(el>zoomStart){
      const zt=Math.min(1,(el-zoomStart)/zoomDur);
      const ze=d3.easeCubicIn(zt);
      globeProj.scale(scaleFrom+(scaleTo-scaleFrom)*ze);
    }

    redraw();

    if(el<totalDur){requestAnimationFrame(frame);}
    else{transitionToMap();}
  }
  requestAnimationFrame(frame);
}

function transitionToMap(){
  // Fade globe out, app in
  document.getElementById('globe-layer').classList.add('out');
  const app=document.getElementById('app');
  app.classList.add('show');

  // Stagger cards in after 1.2s
  setTimeout(()=>{
    const cards=[...document.querySelectorAll('.pcard')];
    cards.forEach((c,i)=>setTimeout(()=>c.classList.add('show'),i*60));
    // Leader lines after all cards
    setTimeout(()=>document.getElementById('leader-svg').classList.add('show'),cards.length*60+300);
  },1200);
}

// ══ LOAD & INIT ══════════════════════════════════════════════════════════════
// Pre-fetch world data in background so click is fast
fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r=>r.json()).then(w=>{worldData=w;initMap(w);}).catch(()=>initMap(null));

applyI18n();
